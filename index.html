<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>আবিদ মিল পোর্টাল</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&display=swap");

      :root {
        /* Google Material Design 3 (M3) Color Palette */
        --md-primary: #6750a4;
        --md-on-primary: #ffffff;
        --md-primary-container: #eaddff;
        --md-on-primary-container: #21005d;

        --md-secondary: #625b71;
        --md-on-secondary: #ffffff;
        --md-secondary-container: #e8def8;
        --md-on-secondary-container: #1d192b;

        --md-tertiary-container: #ffd8e4;
        --md-on-tertiary-container: #31111d;

        --md-error: #b3261e;
        --md-on-error: #ffffff;
        --md-error-container: #f9dedc;
        --md-on-error-container: #410e0b;

        --md-surface: #fef7ff;
        --md-on-surface: #1d1b20;
        --md-surface-variant: #e7e0ec;
        --md-on-surface-variant: #49454f;

        --md-surface-container: #f3edf7;
        --md-surface-container-high: #ece6f0;
        --md-outline: #79747e;
        --md-outline-variant: #cac4d0;

        /* Mapping original variables to M3 */
        --primary: var(--md-primary);
        --primary-light: var(--md-primary-container);
        --bg-body: var(--md-surface-container);
        --bg-card: var(--md-surface);
        --text-main: var(--md-on-surface);
        --text-muted: var(--md-on-surface-variant);
        --danger: var(--md-error);

        /* M3 Elevations & Shapes */
        --radius: 12px;
        --radius-pill: 100px;
        --shadow-1:
          0px 1px 2px 0px rgba(0, 0, 0, 0.3),
          0px 1px 3px 1px rgba(0, 0, 0, 0.15);
        --shadow-2:
          0px 1px 2px 0px rgba(0, 0, 0, 0.3),
          0px 2px 6px 2px rgba(0, 0, 0, 0.15);
        --shadow-3:
          0px 1px 3px 0px rgba(0, 0, 0, 0.3),
          0px 4px 8px 3px rgba(0, 0, 0, 0.15);
        --shadow: var(--shadow-1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Anek Bangla", "Hind Siliguri", sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        overflow-x: hidden;
      }

      /* --- লগইন স্ক্রিন (Material 3 Hero Style) --- */
      #auth-screen {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: var(--md-surface-container);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .auth-card {
        background: var(--md-surface);
        width: 100%;
        max-width: 400px;
        padding: 40px 30px;
        border-radius: 28px;
        text-align: center;
        box-shadow: var(--shadow-3);
      }

      .auth-logo {
        width: 72px;
        height: 72px;
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 20px;
        box-shadow: var(--shadow-1);
      }

      /* --- Auth Tabs (Material Segmented Button) --- */
      .auth-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 25px;
        background: transparent;
        border: 1px solid var(--md-outline);
        border-radius: var(--radius-pill);
        overflow: hidden;
      }
      .auth-tab {
        flex: 1;
        padding: 12px;
        border: none;
        background: transparent;
        font-family: inherit;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        transition: background-color 0.2s, color 0.2s;
        border-right: 1px solid var(--md-outline);
      }
      .auth-tab:last-child {
        border-right: none;
      }
      .auth-tab.active {
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
      }

      /* --- Material 3 Outlined Text Fields --- */
      .form-group {
        text-align: left;
        margin-bottom: 20px;
        position: relative;
      }
      .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--text-main);
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--md-outline);
        border-radius: 4px;
        outline: none;
        font-family: inherit;
        transition: all 0.2s ease;
        background: transparent;
        color: var(--text-main);
        font-size: 16px;
      }
      .form-group input:hover,
      .form-group select:hover {
        border-color: var(--text-main);
      }
      .form-group input:focus,
      .form-group select:focus {
        border: 2px solid var(--md-primary);
        padding: 13px 15px;
      }

      /* --- Material 3 Filled Button --- */
      .btn-main {
        width: 100%;
        padding: 12px;
        background: var(--md-primary);
        color: var(--md-on-primary);
        border: none;
        border-radius: var(--radius-pill);
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        font-size: 15px;
        transition: background-color 0.2s, box-shadow 0.2s;
        box-shadow: var(--shadow-1);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      .btn-main:hover {
        box-shadow: var(--shadow-2);
        background: #5b4694;
      }
      .btn-main:active {
        box-shadow: var(--shadow-1);
      }

      /* --- অ্যাপ কন্টেন্ট --- */
      #app-content {
        display: none;
        padding-bottom: 90px;
        height: 100dvh; /* dvh fixes mobile address bar height issues */
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      header {
        background: var(--md-surface);
        padding: 12px 20px;
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.08);
      }

      main {
        padding: 16px;
        max-width: 600px;
        margin: 0 auto;
      }

      .view-section {
        display: none;
        animation: fadeIn 0.3s ease-out;
      }
      .view-section.active {
        display: block;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card {
        background: var(--md-surface);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: var(--shadow-1);
      }

      /* --- মিল নির্বাচন (M3 Tonal Button Style) --- */
      .meal-btn-selector {
        width: 100%;
        padding: 16px;
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
        border: none;
        border-radius: 16px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: inherit;
        transition: 0.2s;
        margin-bottom: 16px;
      }
      .meal-btn-selector:active {
        background: var(--md-surface-variant);
      }

      .popup-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 15px;
        overflow: scroll;
        max-height: 451px;
      }
      .popup-item {
        padding: 16px 20px;
        text-align: left;
        background: var(--md-surface);
        border: 1px solid var(--md-outline-variant);
        border-radius: 12px;
        font-size: 16px;
        font-weight: 500;
        color: var(--md-on-surface);
        font-family: inherit;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .popup-item i {
        display: none;
        color: var(--md-primary);
        font-size: 20px;
      }
      .popup-item.selected {
        background: var(--md-primary-container);
        border-color: var(--md-primary-container);
        color: var(--md-on-primary-container);
      }
      .popup-item.selected i {
        display: inline-block;
      }

      /* --- মেসেঞ্জার সেকশন --- */
      #messenger {
        /* Fixed responsive height based on header, nav, safe area and padding */
        height: calc(100dvh - 177px - env(safe-area-inset-bottom));
        position: relative;
        flex-direction: column;
        overflow: hidden;
        display: none;
      }

      #messenger.active {
        display: flex; 
      }

      .chat-container {
        display: flex;
        flex-direction: column;
        gap: 17px;
        padding: 10px 0 85px 0;
        height: 100%;
        overflow-y: auto;
      }

      .message-group {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        max-width: 85%;
      }
      .message-group.sent {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--md-surface-variant);
        flex-shrink: 0;
        margin-bottom: 20px;
      }
      .msg-content-wrapper {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .message-group.sent .msg-content-wrapper {
        align-items: flex-end;
      }
      .sender-name {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        margin: 0 4px;
      }

      .bubble {
        padding: 12px 16px;
        border-radius: 20px;
        font-size: 15px;
        line-height: 1.4;
        position: relative;
        max-width: 85%;
        word-break: break-word;
      }
      .received .bubble {
        background: var(--md-surface-variant);
        color: var(--md-on-surface-variant);
        border-bottom-left-radius: 4px;
      }
      .sent .bubble {
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
        border-bottom-right-radius: 4px;
      }
      .msg-time {
        font-size: 10px;
        opacity: 0.8;
        margin-top: 2px;
        color: var(--text-muted);
      }

      .chat-input-area {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--md-surface);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        border-top: 1px solid var(--md-outline-variant);
      }
      .chat-input-wrapper {
        max-width: 100%;
        width: 100%;
        display: flex;
        gap: 10px;
        background: var(--md-surface-container-high);
        padding: 6px 6px 6px 16px;
        border-radius: 30px;
        box-shadow: var(--shadow-1);
        align-items: center;
      }
      .chat-input-area input {
        flex: 1;
        padding: 10px 0;
        border: none;
        background: transparent;
        outline: none;
        color: var(--md-on-surface);
        font-family: inherit;
        font-size: 15px;
      }
      .send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--md-primary);
        color: var(--md-on-primary);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
      }
      .send-btn:active {
        transform: scale(0.9);
      }

      /* M3 Notification Items */
      .notif-item {
        padding: 16px;
        border-radius: var(--radius);
        background: var(--md-surface);
        margin-bottom: 12px;
        display: flex;
        gap: 16px;
        position: relative;
        box-shadow: var(--shadow-1);
        transition: 0.2s;
        border: 1px solid transparent;
      }
      .notif-item.unread {
        background: var(--md-surface);
        border-color: var(--md-outline-variant);
      }
      .notif-item.read {
        opacity: 0.6;
        box-shadow: none;
        border-color: var(--md-surface-variant);
        background: var(--md-surface-container);
      }
      .notif-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .unread .notif-icon {
        background: var(--md-tertiary-container);
        color: var(--md-on-tertiary-container);
      }
      .read .notif-icon {
        background: var(--md-surface-variant);
        color: var(--md-on-surface-variant);
      }

      .mark-read-btn {
        margin-top: 12px;
        padding: 8px 16px;
        font-size: 13px;
        color: var(--md-on-secondary-container);
        background: var(--md-secondary-container);
        border: none;
        border-radius: var(--radius-pill);
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background-color 0.2s;
      }
      .mark-read-btn:hover {
        background: var(--md-outline-variant);
      }

      /* M3 Bottom Navigation */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--md-surface-container);
        height: 80px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        z-index: 200;
        padding-bottom: env(safe-area-inset-bottom);
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        background: none;
        border: none;
        color: var(--md-on-surface-variant);
        font-family: inherit;
        font-weight: 500;
        font-size: 12px;
        cursor: pointer;
        height: 100%;
      }
      .nav-icon-wrap {
        width: 64px;
        height: 32px;
        border-radius: 16px;
        transition: 0.2s ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .nav-item i {
        font-size: 20px;
      }
      .nav-item.active {
        color: var(--md-on-surface);
        font-weight: 600;
      }
      .nav-item.active .nav-icon-wrap {
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
      }
      .nav-badge {
        position: absolute;
        top: 2px;
        right: 12px;
        background: var(--md-error);
        color: var(--md-on-error);
        font-size: 10px;
        font-weight: 600;
        padding: 0 4px;
        border-radius: 8px;
        min-width: 16px;
        text-align: center;
        box-shadow: 0 0 0 2px var(--md-surface-container);
      }
      .nav-item.active .nav-badge {
        box-shadow: 0 0 0 2px var(--md-secondary-container);
      }

      /* M3 Modal/Dialog */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
      }
      .modal-content {
        background: var(--md-surface-container-high);
        border-radius: 28px;
        width: 100%;
        max-width: 360px;
        overflow: hidden;
        box-shadow: var(--shadow-3);
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes slideUp {
        from { transform: translateY(40px) scale(0.95); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }

      /* M3 Snackbar / Toast */
      .toast-box {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #313033;
        color: #f4eff4;
        padding: 14px 24px;
        border-radius: 4px;
        font-size: 14px;
        transition: 0.3s ease;
        z-index: 2000;
        font-weight: 500;
        box-shadow: var(--shadow-2);
        opacity: 0;
        pointer-events: none;
      }
      .toast-box.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-bolt"></i></div>
        <h2 style="margin-bottom: 24px; color: var(--text-main); font-weight: 600">
          আবিদ সিকিউরিটি পোর্টাল
        </h2>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuth('login')">লগ ইন</button>
          <button class="auth-tab" onclick="switchAuth('signup')">নতুন Account</button>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label>নাম</label>
            <select id="loginName" required>
              <option value="">নাম লোড হচ্ছে...</option>
            </select>
          </div>
          <div class="form-group">
            <label>ই-মেল</label>
            <input type="email" id="signupEmail" placeholder="আপনার ই-মেল দিন" required />
          </div>
          <button type="submit" class="btn-main" id="loginBtn">লগইন করুন</button>
        </form>

        <form id="signupForm" style="display: none">
          <div class="form-group">
            <label>নাম নির্বাচন করুন</label>
            <select id="signupName" required>
              <option value="">নাম লোড হচ্ছে...</option>
            </select>
          </div>
          <div class="form-group">
            <label>ই-মেল দিন</label>
            <input type="email" id="signupEmail" placeholder="একটি নতুন ই-মেল দিন" required />
          </div>
          <button type="submit" class="btn-main" id="signupBtn">অ্যাকাউন্ট তৈরি করুন</button>
        </form>
      </div>
    </div>

    <div id="app-content">
      <header>
        <h3 id="view-title" style="font-size: 20px; font-weight: 600">হোম</h3>
        <div style="display: flex; gap: 15px; align-items: center">
          <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--md-surface-variant); overflow: hidden; cursor: pointer; border: 1px solid var(--md-outline-variant);">
            <img id="headerAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" style="width: 100%" />
          </div>
        </div>
      </header>

      <main>
        <section id="home" class="view-section active">
          <div class="card">
            <h4 style="margin-bottom: 16px; color: var(--text-main); font-weight: 600;">
              আপনার মিল নির্বাচন করুন
            </h4>

            <button id="mealSelectBtn" class="meal-btn-selector" onclick="openMealPopup()">
              <span id="mealBtnText">মিল নির্বাচন করুন</span>
              <i class="fas fa-chevron-circle-down"></i>
            </button>

            <div id="meal-submission-result" style="padding: 14px; border-radius: 12px; background: var(--md-primary-container); color: var(--md-on-primary-container); font-weight: 600; text-align: center; display: none; margin-bottom: 16px;"></div>

            <div style="margin-top: 10px">
              <button onclick="toggleOthersMeal()" style="width: 100%; padding: 16px; background: var(--md-surface-container); color: var(--md-on-surface); border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;">
                <span>আজকের মিল এন্ট্রি দেখুন</span>
                <i class="fas fa-chevron-down" id="others-meal-icon" style="color: var(--md-on-surface-variant)"></i>
              </button>
              <div id="others-meal-list" style="display: none; margin-top: 8px; background: var(--md-surface); border-radius: 12px; border: 1px solid var(--md-outline-variant); padding: 16px;">
                <div style="text-align: center; color: var(--text-muted)">
                  <i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...
                </div>
              </div>
            </div>
          </div>

          <div id="home-content">
            <div style="text-align: center; padding: 40px">
              <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary)"></i>
              <p style="margin-top: 15px; color: var(--text-muted); font-weight: 500;">ডেটা লোড হচ্ছে...</p>
            </div>
          </div>
        </section>

        <section id="messenger" class="view-section">
          <div class="chat-container" id="chatBox">
            <div style="text-align: center; padding: 40px">
              <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary)"></i>
              <p style="margin-top: 15px; color: var(--text-muted); font-weight: 500;">মেসেজ লোড হচ্ছে...</p>
            </div>
          </div>

          <div class="chat-input-area">
            <div class="chat-input-wrapper">
              <input type="text" id="chatInput" placeholder="আপনার বার্তা লিখুন..." onkeypress="if (event.key === 'Enter') sendMsg();" />
              <button class="send-btn" id="sendMsgBtn" onclick="sendMsg()">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </section>

        <section id="report" class="view-section">
          <div id="report-content">
            <div style="text-align: center; padding: 40px">
              <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary)"></i>
              <p style="margin-top: 15px; color: var(--text-muted); font-weight: 500;">ডেটা লোড হচ্ছে...</p>
            </div>
          </div>
        </section>

        <section id="notification" class="view-section">

      function generateFingerprint() {
        const navigator = window.navigator;
        const screen = window.screen;
        const data = [
          navigator.userAgent,
          navigator.language,
          screen.colorDepth,
          screen.width + "x" + screen.height,
          new Date().getTimezoneOffset(),
          navigator.hardwareConcurrency, 
          navigator.deviceMemory, 
          navigator.platform,
        ].join("||");

        const hash = (str, seed = 0) => {
          let h1 = 0xdeadbeef ^ seed,
            h2 = 0x41c6ce57 ^ seed;
          for (let i = 0, ch; i < str.length; i++) {
            ch = str.charCodeAt(i);
            h1 = Math.imul(h1 ^ ch, 2654435761);
            h2 = Math.imul(h2 ^ ch, 1597334677);
          }
          h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
          h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
          h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
          h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
          return ((h2 >>> 0).toString(16).padStart(8, "0") + (h1 >>> 0).toString(16).padStart(8, "0"));
        };

        return "FP_" + hash(data).toUpperCase();
      }

      function getNextUnlockTime() {

      function getNextLockTime() {

        return lockTime;

      function formatTimeLeft(targetDate) {
        const diff = targetDate - new Date();
        if (diff <= 0) return "00:00:00";
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);
        return `${h.toString().padStart(2, "0")} ঘন্টা ${m.toString().padStart(2, "0")} মিনিট ${s.toString().padStart(2, "0")} সেকেন্ড পরে`;
      }

      function checkMealSubmissionStatus() {

        if (typeof MEAL_LOCK_END_HOUR === "undefined") return false;

        const submitTime = new Date(mealData.timestamp);
        const now = new Date();
        const lastUnlock = new Date();

        lastUnlock.setHours(MEAL_LOCK_END_HOUR, MEAL_LOCK_END_MIN, 0, 0);

        if (now.getTime() < lastUnlock.getTime()) {
          lastUnlock.setDate(lastUnlock.getDate() - 1);
        }

        return submitTime.getTime() >= lastUnlock.getTime();
      }

      function renderMessages(msgs) {
        const box = document.getElementById("chatBox");
        const currentUserFP = localStorage.getItem("userFingerPrint");

        if (!msgs || msgs.length === 0) {
          box.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">কোনো মেসেজ নেই। নতুন মেসেজ পাঠান!</div>';
          return;
        }

        box.innerHTML = msgs.map((m) => {
            const isSentByMe = m.userFingerPrint === currentUserFP;
            const msgType = isSentByMe ? "sent" : "received";
            const avatarSeed = encodeURIComponent(m.userName);
            const displaySender = isSentByMe ? "আপনি" : m.userName || "Unknown";

            return `
                <div class="message-group ${msgType}">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${avatarSeed}" class="msg-avatar">
                    <div class="msg-content-wrapper">
                        <span class="sender-name">${displaySender}</span>
                        <div class="bubble">${m.message}</div>
                        <span class="msg-time">${m.dateTime}</span>
                    </div>
                </div>
            `;
          }).join("");

        box.scrollTop = box.scrollHeight;
      }

      async function sendMsg() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        const sendBtn = document.getElementById("sendMsgBtn");
        const originalIcon = sendBtn.innerHTML;

        const fp = localStorage.getItem("userFingerPrint") || "Unknown";
        const uName = localStorage.getItem("userName") || "Anonymous";
        const now = new Date();
        const dateTimeStr = now.toLocaleDateString("bn-BD") + " " + now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
        input.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        const box = document.getElementById("chatBox");
        const avatarSeed = encodeURIComponent(uName);
        const tempMsgHtml = `
          <div class="message-group sent" id="temp-msg" style="opacity: 0.6;">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${avatarSeed}" class="msg-avatar">

                  <span class="sender-name">আপনি (পাঠানো হচ্ছে...)</span>
                  <div class="bubble">${text}</div>
                  <span class="msg-time">${dateTimeStr}</span>
              </div>
          </div>
        `;
        box.insertAdjacentHTML("beforeend", tempMsgHtml);
        box.scrollTop = box.scrollHeight;

        const payload = {
          userFingerPrint: fp,
          userName: uName,
          message: text,
          dateTime: dateTimeStr,
        };
        try {
          const response = await fetch(`${SCRIPT_URL_MSG}?action=createMessage`, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload),
            redirect: "follow",
          });
          if (response.ok || response.type === "opaque") {
            input.value = "";
            const tempMsg = document.getElementById("temp-msg");
            if (tempMsg) {
              tempMsg.style.opacity = "1";
              tempMsg.querySelector(".sender-name").innerText = "আপনি";
              tempMsg.removeAttribute("id");
            }
            setTimeout(fetchMessages, 1000);
          } else {
            throw new Error("Server responded with an error");
          }
        } catch (error) {
          console.error("Error sending message:", error);
          showToast("মেসেজ পাঠাতে সমস্যা হয়েছে। ইন্টারকানেকশন চেক করুন।");
          const tempMsg = document.getElementById("temp-msg");
          if (tempMsg) tempMsg.remove();
        } finally {
          input.disabled = false;
          sendBtn.innerHTML = originalIcon;
          input.focus();
        }
      }

      function isMealLocked() {
        if (typeof MEAL_LOCK_START_HOUR === "undefined") return true; 

        const now = new Date();
        const currentTotalMin = now.getHours() * 60 + now.getMinutes();
        const startTotalMin = MEAL_LOCK_START_HOUR * 60 + MEAL_LOCK_START_MIN;
        const endTotalMin = MEAL_LOCK_END_HOUR * 60 + MEAL_LOCK_END_MIN;

        if (startTotalMin > endTotalMin) {
          return (currentTotalMin >= startTotalMin || currentTotalMin < endTotalMin);
        } else {
          return (currentTotalMin >= startTotalMin && currentTotalMin < endTotalMin);
        }
      }

      function applyMealLockState() {
        if (mealLockTimer) clearInterval(mealLockTimer);

        const mealBtn = document.getElementById("mealSelectBtn");
        const mealBtnText = document.getElementById("mealBtnText");
        const icon = mealBtn.querySelector("i");

        if (typeof MEAL_LOCK_START_HOUR === "undefined") {
          mealBtn.disabled = true;
          mealBtn.style.background = "var(--md-surface-variant)";
          mealBtn.style.color = "var(--md-on-surface-variant)";
          mealBtn.style.cursor = "wait";
          icon.className = "fas fa-spinner fa-spin";
          mealBtnText.innerHTML = `<span style="font-size: 15px; font-weight: 600;">চেক করা হচ্ছে...</span>`;
          resultDiv.style.display = "none";
          return;
        }

        const saved = localStorage.getItem("abid_meal");
        let mealData = saved ? JSON.parse(saved) : null;

        const naturallyLocked = isMealLocked();
        const submittedOnce = checkMealSubmissionStatus();

        if (naturallyLocked || submittedOnce) {
          mealBtn.disabled = true;
          mealBtn.style.background = "var(--md-surface-variant)";
          mealBtn.style.color = "var(--md-on-surface-variant)";
          mealBtn.style.cursor = "not-allowed";
          icon.className = "fas fa-lock";

          let targetTime;
          let timeLabel;
          let mainText;

          // সিঙ্ক্রোনাইজড টাইমার লজিক: ন্যাচারালি লকড থাকলে পরবর্তী চালুর সময়, আর সাবমিট করা হলে বর্তমান সেশন বন্ধ হওয়ার সময় দেখাবে
          if (naturallyLocked) {
              mainText = "মিল নির্বাচনের সময় শেষ হয়েছে!";
              targetTime = getNextUnlockTime();
              timeLabel = "চালু হবে ঃ";
          } else {
              mainText = "মিল নির্বাচন সম্পন্ন (সাময়িক ভাবে বন্ধ)";
              targetTime = getNextLockTime();
              timeLabel = "বন্ধ হবে ঃ";
          }

          const updateTimerUI = () => {
            const now = new Date();
            if (now >= targetTime) {
              clearInterval(mealLockTimer);
              applyMealLockState();
            } else {
              const timerSpan = document.getElementById("meal-countdown-timer");
              if (timerSpan) {
                timerSpan.innerText = `${timeLabel} ${formatTimeLeft(targetTime)}`;
              }
            }
          };

          mealBtnText.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: flex-start; text-align: left;">
                <span style="font-size: 15px; font-weight: 600;">${mainText}</span>
                <span id="meal-countdown-timer" style="font-size: 13px; font-weight: 600; color: var(--md-error); margin-top: 4px;">${timeLabel} ${formatTimeLeft(targetTime)}</span>
            </div>
          `;

          mealLockTimer = setInterval(updateTimerUI, 1000);

          if (mealData) {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `কালকের মিল &nbsp;<i class="fas fa-check-circle" style="margin-right:5px;"></i><b>${mealData.txt}</b>`;
          } else {
            resultDiv.style.display = "none";
          }
        } else {
          mealBtn.disabled = false;
          mealBtn.style.background = "var(--md-secondary-container)";
          mealBtn.style.color = "var(--md-on-secondary-container)";
          mealBtn.style.cursor = "pointer";
          icon.className = "fas fa-chevron-circle-down";
          mealBtnText.innerHTML = mealData ? `<b>${mealData.txt}</b> নির্বাচন করা হয়েছে` : "মিল নির্বাচন করুন";

          if (mealData) {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<i class="fas fa-check-circle" style="margin-right:5px;"></i> নির্বাচিত ছিল: <b>${mealData.txt}</b>`;
          } else {
            resultDiv.style.display = "none";
          }
        }
      }

      function openMealPopup() {
        if (typeof MEAL_LOCK_START_HOUR === "undefined") {
          showToast("সার্ভার থেকে ডেটা লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...");
          return;
        }

        if (isMealLocked() || checkMealSubmissionStatus()) {
          showToast("মিল নির্বাচনের সময় শেষ হয়েছে!");
          return;
        }
        document.getElementById("mealSelectionModal").style.display = "flex";
        const saved = localStorage.getItem("abid_meal");
        tempSelectedMeal = saved ? JSON.parse(saved) : null;
        document.querySelectorAll(".popup-item").forEach((el) => {
          if (tempSelectedMeal && el.getAttribute("data-val") === tempSelectedMeal.val) {
            el.classList.add("selected");
          } else {
            el.classList.remove("selected");
          }
        });
      }

      function closeMealPopup() {
        document.getElementById("mealSelectionModal").style.display = "none";
      }

      function highlightMeal(element, value, text) {
        document.querySelectorAll(".popup-item").forEach((el) => el.classList.remove("selected"));
        element.classList.add("selected");
        tempSelectedMeal = { val: value, txt: text };
      }

      async function confirmMealSelection() {
        if (!tempSelectedMeal) {
          showToast("অনুগ্রহ করে একটি মিল নির্বাচন করুন");
          return;
        }

        const submitBtn = document.querySelector('button[onclick="confirmMealSelection()"]');
        const originalText = submitBtn.innerText;
        submitBtn.innerText = "অপেক্ষা করুন...";
        submitBtn.disabled = true;

        const userName = localStorage.getItem("userName") || "Unknown";
        const fp = localStorage.getItem("userFingerPrint") || "Unknown";
        const now = new Date();
        try {
          const response = await fetch(`${SCRIPT_URL_MEAL}?action=createMeal`, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
              name: userName,
              mealValue: tempSelectedMeal.val,
              mealText: tempSelectedMeal.txt,
              date: now.toISOString(),
              fingerprint: fp,
            }),
            redirect: "follow",
          });
          if (response.ok || response.type === "opaque") {
            tempSelectedMeal.timestamp = new Date().getTime();
            localStorage.setItem("abid_meal", JSON.stringify(tempSelectedMeal));

            applyMealLockState();
            closeMealPopup();
            showToast("মিল আপডেট সম্পন্ন হয়েছে");

            const othersList = document.getElementById("others-meal-list");
            if (othersList.style.display === "block") {
              fetchOthersMeals();
            }
          } else {
            throw new Error("Server error");
          }
        } catch (error) {
          console.error("Meal submission error:", error);
          showToast("মিল সাবমিট করতে সমস্যা হয়েছে।");
        } finally {
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        }
      }

      function toggleOthersMeal() {
        const list = document.getElementById("others-meal-list");
        const icon = document.getElementById("others-meal-icon");
        if (list.style.display === "none") {
          list.style.display = "block";
          icon.style.transform = "rotate(180deg)";
          fetchOthersMeals(); 
        } else {
          list.style.display = "none";
          icon.style.transform = "rotate(0deg)";
        }
        icon.style.transition = "0.3s";
      }

      async function fetchOthersMeals() {
        const list = document.getElementById("others-meal-list");
        list.innerHTML = '<div style="text-align:center; padding:15px; color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...</div>';
        try {
          const res = await fetch(`${SCRIPT_URL_MEAL}?action=getMeals`, {
            method: "GET",
            mode: "cors",
            redirect: "follow",
          });
          const data = await res.json();
          const today = new Date();

          let mealsData = Array.isArray(data) ? data : data.data || [];
          const todaysMeals = mealsData.filter((item) => {
            if (!item.date) return false;
            const d = new Date(item.date);
            if (isNaN(d.getTime())) {
              const todayStr = today.toLocaleDateString();
              return String(item.date).includes(todayStr);
            }
            return (
              d.getDate() === today.getDate() &&
              d.getMonth() === today.getMonth() &&
              d.getFullYear() === today.getFullYear()
            );
          });

          if (todaysMeals.length === 0) {
            list.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--text-muted);">আজকের কোনো মিল এন্ট্রি পাওয়া যায়নি।</div>';
            return;
          }

          let html = '<ul style="list-style: none; padding: 0; margin: 0">';
          todaysMeals.forEach((m) => {
            html += `
              <li style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--md-outline-variant); margin-bottom: 12px;">
                <span style="font-weight: 500; font-size: 15px; color: var(--md-on-surface);">${m.name || m.Name || "অজানা"}</span>
                <span style="background: var(--md-primary-container); color: var(--md-on-primary-container); padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;">${m.mealText || m.meal || ""}</span>
              </li>`;
          });
          html += "</ul>";

          list.innerHTML = html;
        } catch (error) {
          console.error("Error fetching others meals:", error);
          list.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--danger);">ডেটা লোড করতে ব্যর্থ হয়েছে।</div>';
        }
      }

      function parseCSV(text) {
        const rows = text.trim().split("\n").map((row) => row.split(","));
        const headers = rows[0].map((h) => h.trim());
        const data = rows.slice(1).map((row) => {
          let obj = {};
          row.forEach((cell, i) => {
            obj[headers[i]] = cell ? cell.trim().replace(/^"|"$/g, "") : "";
          });
          return obj;
        });
        return { headers, data };
      }

      async function fetchReportData() {
        try {
          const response = await fetch(`${CSV_URL_1}&t=${Date.now()}`);
          if (!response.ok) throw new Error("Network error");
          const text = await response.text();
          globalSheetData = parseCSV(text);
          renderHomeData();
          renderReportData();
        } catch (error) {
          console.error("Fetch error:", error);
          document.getElementById("home-content").innerHTML = '<p style="text-align:center; padding: 20px; color: var(--danger); font-weight:600;">ডেটা লোড করতে সমস্যা হয়েছে!</p>';
          document.getElementById("report-content").innerHTML = '<p style="text-align:center; padding: 20px; color: var(--danger); font-weight:600;">ডেটা লোড করতে সমস্যা হয়েছে!</p>';
        }
      }

      function renderHomeData() {
        const container = document.getElementById("home-content");
        if (!globalSheetData || !globalSheetData.data.length) return;
        const takeList = globalSheetData.data.filter((row) => row.dueTkName);
        let html = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 24px 0 16px;">
                <h4 style="margin: 0; color: var(--text-main); font-weight: 600;">সক্রিয় ডিউ [বাঁকি] গ্রহীতা</h4>
                <span style="font-size: 13px; background: var(--md-surface-variant); color: var(--md-on-surface-variant); padding: 4px 12px; border-radius: var(--radius-pill); font-weight: 600;">${takeList.length} টি এন্ট্রি</span>
            </div>
            <div style="display: grid; gap: 12px;">
                ${takeList.map((item, index) => `
                    <div style="background: var(--md-surface); padding: 16px; border-radius: 12px; border: 1px solid var(--md-outline-variant); display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-1);">
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--md-tertiary-container); color: var(--md-on-tertiary-container); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; flex-shrink: 0;">
                            ${item.dueTkName.charAt(0).toUpperCase()}
                        </div>
                        <div style="flex: 1; overflow: hidden;">
                            <p style="margin: 0; font-weight: 600; font-size: 16px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.dueTkName}</p>
                            <p style="margin: 0; font-size: 13px; color: var(--text-muted); margin-top: 4px;">এন্ট্রি #${index + 1}</p>
                        </div>
                    </div>
                `).join("")}
            </div>
        `;
        container.innerHTML = html;
      }

      function renderReportData() {
        const container = document.getElementById("report-content");
        if (!globalSheetData || !globalSheetData.data.length) return;
        const rateValue = globalSheetData.data.find((row) => row.mealRate)?.mealRate || "0.00";
        const reportData = globalSheetData.data.filter((row) => row.Name);
        let html = `
            <div class="card" style="background: var(--md-primary); color: var(--md-on-primary); border-radius: 24px; padding: 32px 24px; box-shadow: var(--shadow-2); margin-bottom: 24px;">
                <p style="font-size: 13px; opacity: 0.9; text-transform: uppercase; font-weight: 600; margin-bottom: 8px;">গতকালের মিল রেট</p>
                <h2 style="font-size: 42px; margin: 0; font-weight: 500;">${rateValue} <span style="font-size: 18px; opacity: 0.8;">৳</span></h2>
            </div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="padding: 20px; border-bottom: 1px solid var(--md-outline-variant); display: flex; justify-content: space-between; align-items: center; background: var(--md-surface-container-high);">
                    <h4 style="margin: 0; font-weight: 500;">মিল রিপোর্ট</h4>
                </div>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; text-align: left; border-collapse: collapse; font-size: 14px;">
                        <thead style="background: var(--md-surface); border-bottom: 1px solid var(--md-outline-variant);">
                            <tr>
                                <th style="padding: 16px; font-weight: 600; color: var(--text-muted);">নাম</th>
                                <th style="padding: 16px; font-weight: 600; color: var(--text-muted); text-align: center;">মিল</th>
                                <th style="padding: 16px; font-weight: 600; color: var(--text-muted); text-align: center;">জমা [৳]</th>
                                <th style="padding: 16px; font-weight: 600; color: var(--text-muted); text-align: center;">খরচ</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${reportData.map((row) => `
                                <tr style="border-bottom: 1px solid var(--md-outline-variant);">
                                    <td style="padding: 16px; font-weight: 500; color: var(--text-main); white-space: nowrap;">${row.Name}</td>
                                    <td style="padding: 16px; text-align: center;"><span style="background: var(--md-primary-container); color: var(--md-on-primary-container); padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 600;">${row["Total Meal"] || 0}</span></td>
                                    <td style="padding: 16px; text-align: center; color: var(--text-muted); font-weight: 500;">${row.GivenTk || 0}</td>
                                    <td style="padding: 16px; text-align: center;">
                                        ${row.Eaten && row.Eaten !== "0" ? `<span style="color: var(--md-error); font-weight: 600;">${row.Eaten}</span>` : `<span style="color: var(--md-outline-variant);">-</span>`}
                                    </td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = html;
      }

      async function fetchNotifications() {
        const box = document.getElementById("notif-box");

        if (box.innerHTML.trim() === "") {
          box.innerHTML = `
            <div style="text-align: center; padding: 40px">
              <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary)"></i>
              <p style="margin-top: 15px; color: var(--text-muted); font-weight: 500;">নোটিফিকেশন লোড হচ্ছে...</p>
            </div>`;
        }

        try {
          const url = new URL(SCRIPT_URL_NOTIF);
          url.searchParams.append("action", "getNotifications");

          const userName = localStorage.getItem("userName");
          if (userName) {
            url.searchParams.append("user", userName);
          }

          const response = await fetch(url.toString(), {
            method: "GET",
            mode: "cors",
            redirect: "follow",
          });

          if (!response.ok) throw new Error("Failed to fetch notifications");

          const fetchedNotifs = await response.json();

          let localNotifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
          let readIds = localNotifs.filter((n) => n.read).map((n) => String(n.id));

          const mergedNotifs = fetchedNotifs.map((n) => ({
            ...n,
            read: readIds.includes(String(n.id)),
          }));

          localStorage.setItem("abid_notifs", JSON.stringify(mergedNotifs));
          renderNotifications();
        } catch (error) {
          console.error("Error fetching notifications:", error);
          renderNotifications();
        }
      }

      function updateNavBadgeCount(unreadCount) {
        const navBadge = document.getElementById("nav-notif-badge");
        if (navBadge) {
          navBadge.innerText = unreadCount;
          navBadge.style.display = unreadCount > 0 ? "block" : "none";
        }
      }

      function renderNotifications() {
        const box = document.getElementById("notif-box");
        let notifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
        let unreadCount = notifs.filter((n) => !n.read).length;

        updateNavBadgeCount(unreadCount);

        if (notifs.length === 0) {
          box.innerHTML = "<div style='text-align:center; padding:50px 20px; color:var(--md-outline);'><i class='fas fa-bell-slash fa-3x' style='margin-bottom:16px; opacity:0.5;'></i><p style='font-weight:500;'>কোন নতুন নোটিফিকেশন নেই</p></div>";
          document.getElementById("notif-count").innerText = "০টি নোটিফিকেশন";
          return;
        }

        document.getElementById("notif-count").innerText = `${unreadCount}টি নতুন নোটিফিকেশন`;

        box.innerHTML = notifs.sort((a, b) => b.id - a.id).map((n) => `
            <div class="notif-item ${n.read ? "read" : "unread"}" id="${n.id}">
                <div class="notif-icon"><i class="fas ${n.icon || "fa-bell"}"></i></div>
                <div style="flex: 1;">
                    <p style="font-weight: 600; font-size: 16px; color: var(--text-main); margin-bottom: 4px;">${n.title}</p>
                    <p style="font-size: 14px; color: var(--text-muted); line-height: 1.4;">${n.desc}</p>
                    ${!n.read ? `<button onclick="markRead('${n.id}')" class="mark-read-btn"><i class="fas fa-check"></i> পঠিত হিসেবে চিহ্নিত করুন</button>` : ""}
                </div>
            </div>
        `).join("");
      }

      function markRead(id) {
        let notifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
        let index = notifs.findIndex((n) => String(n.id) === String(id));
        if (index !== -1) {
          notifs[index].read = true;
          localStorage.setItem("abid_notifs", JSON.stringify(notifs));
          renderNotifications();
          showToast("পঠিত হিসেবে চিহ্নিত হয়েছে");
        }
      }

      function clearNotif() {
        let notifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
        notifs.forEach((n) => (n.read = true));
        localStorage.setItem("abid_notifs", JSON.stringify(notifs));
        renderNotifications();
        showToast("সব নোটিফিকেশন পঠিত হিসেবে চিহ্নিত করা হয়েছে");
      }

      function showToast(msg) {
        const existingToast = document.querySelector(".toast-box");
        if (existingToast) existingToast.remove();

        const t = document.createElement("div");
        t.className = "toast-box";
        t.innerText = msg;
        document.body.appendChild(t);

        void t.offsetWidth;

        t.classList.add("show");
        setTimeout(() => {
          t.classList.remove("show");
          setTimeout(() => t.remove(), 400);
        }, 3000);
      }
    </script>
  </body>
</html>
