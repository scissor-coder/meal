<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>আবিদ মিল পোর্টাল</title>
    <!-- Google Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&display=swap");

      :root {
        color-scheme: light;
        /* Light Mode - Google Material Design 3 (M3) Color Palette */
        --md-primary: #6750a4;
        --md-on-primary: #ffffff;
        --md-primary-container: #eaddff;
        --md-on-primary-container: #21005d;

        --md-secondary: #625b71;
        --md-on-secondary: #ffffff;
        --md-secondary-container: #e8def8;
        --md-on-secondary-container: #1d192b;

        --md-tertiary-container: #ffd8e4;
        --md-on-tertiary-container: #31111d;

        --md-error: #b3261e;
        --md-on-error: #ffffff;
        --md-error-container: #f9dedc;
        --md-on-error-container: #410e0b;

        --md-surface: #fef7ff;
        --md-on-surface: #1d1b20;
        --md-surface-variant: #e7e0ec;
        --md-on-surface-variant: #49454f;

        --md-surface-container: #f3edf7;
        --md-surface-container-high: #ece6f0;
        --md-outline: #79747e;
        --md-outline-variant: #cac4d0;

        /* Inverse for Toasts */
        --md-inverse-surface: #313033;
        --md-inverse-on-surface: #f4eff4;

        /* Core mappings */
        --primary: var(--md-primary);
        --primary-light: var(--md-primary-container);
        --bg-body: var(--md-surface-container);
        --bg-card: var(--md-surface);
        --text-main: var(--md-on-surface);
        --text-muted: var(--md-on-surface-variant);
        --danger: var(--md-error);

        /* Elevations & Shapes */
        --radius: 12px;
        --radius-pill: 100px;
        --shadow-1: 0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 1px 3px 1px rgba(0, 0, 0, 0.15);
        --shadow-2: 0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 2px 6px 2px rgba(0, 0, 0, 0.15);
        --shadow-3: 0px 1px 3px 0px rgba(0, 0, 0, 0.3), 0px 4px 8px 3px rgba(0, 0, 0, 0.15);
      }

      /* Dark Mode Overrides */
      body.dark-mode {
        color-scheme: dark;
        --md-primary: #d0bcff;
        --md-on-primary: #381e72;
        --md-primary-container: #4f378b;
        --md-on-primary-container: #eaddff;

        --md-secondary: #ccc2dc;
        --md-on-secondary: #332d41;
        --md-secondary-container: #4a4458;
        --md-on-secondary-container: #e8def8;

        --md-tertiary-container: #633b48;
        --md-on-tertiary-container: #ffd8e4;

        --md-error: #f2b8b5;
        --md-on-error: #601410;
        --md-error-container: #8c1d18;
        --md-on-error-container: #f9dedc;

        --md-surface: #141218;
        --md-on-surface: #e6e0e9;
        --md-surface-variant: #49454f;
        --md-on-surface-variant: #cac4d0;

        --md-surface-container: #1d1b20;
        --md-surface-container-high: #2b2930;
        --md-outline: #938f99;
        --md-outline-variant: #49454f;

        --md-inverse-surface: #e6e1e5;
        --md-inverse-on-surface: #313033;

        --shadow-1: 0px 1px 2px 0px rgba(0, 0, 0, 0.8), 0px 1px 3px 1px rgba(0, 0, 0, 0.6);
        --shadow-2: 0px 1px 2px 0px rgba(0, 0, 0, 0.8), 0px 2px 6px 2px rgba(0, 0, 0, 0.6);
        --shadow-3: 0px 1px 3px 0px rgba(0, 0, 0, 0.8), 0px 4px 8px 3px rgba(0, 0, 0, 0.6);

        /* FIX: Re-alias variables to fix CSS cascading issues in dark mode */
        --primary: var(--md-primary);
        --primary-light: var(--md-primary-container);
        --bg-body: var(--md-surface-container);
        --bg-card: var(--md-surface);
        --text-main: var(--md-on-surface);
        --text-muted: var(--md-on-surface-variant);
        --danger: var(--md-error);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Anek Bangla", "Hind Siliguri", sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        overflow-x: hidden;
        transition: background-color 0.3s, color 0.3s;
      }

      /* Material Icons setup */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
        transition: 0.3s ease;
      }
      .active .material-symbols-outlined, .filled-icon {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      /* Custom Spinner */
      .spinner {
        width: 20px;
        height: 20px;
        border: 2.5px solid var(--md-on-primary);
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }
      .spinner.primary { border-color: var(--md-primary); border-bottom-color: transparent; }
      @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* Skeleton Loading Styles */
      .skeleton {
        background: linear-gradient(
          90deg,
          var(--md-surface-variant) 25%,
          var(--md-surface-container-high) 50%,
          var(--md-surface-variant) 75%
        );
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
        border-radius: 8px;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .skeleton-text { height: 16px; margin-bottom: 8px; width: 100%; border-radius: 4px; }
      .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }

      /* --- লগইন স্ক্রিন --- */
      #auth-screen {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: var(--md-surface-container);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        transition: background-color 0.3s;
      }

      .auth-card {
        background: var(--md-surface);
        width: 100%;
        max-width: 400px;
        padding: 40px 30px;
        border-radius: 28px;
        text-align: center;
        box-shadow: var(--shadow-3);
      }

      .auth-logo {
        width: 72px;
        height: 72px;
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        box-shadow: var(--shadow-1);
      }
      .auth-logo span { font-size: 36px; }

      .auth-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 25px;
        border: 1px solid var(--md-outline);
        border-radius: var(--radius-pill);
        overflow: hidden;
      }
      .auth-tab {
        flex: 1;
        padding: 12px;
        border: none;
        background: transparent;
        font-family: inherit;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        transition: background-color 0.2s, color 0.2s;
        border-right: 1px solid var(--md-outline);
      }
      .auth-tab:last-child { border-right: none; }
      .auth-tab.active {
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
      }

      .form-group { text-align: left; margin-bottom: 20px; position: relative; }
      .form-group label {
        display: block; font-weight: 500; margin-bottom: 6px; font-size: 13px; color: var(--text-main);
      }
      .form-group input, .form-group select {
        width: 100%; padding: 14px 16px; border: 1px solid var(--md-outline);
        border-radius: 8px; outline: none; font-family: inherit;
        background: transparent; color: var(--text-main); font-size: 16px; transition: 0.2s ease;
      }
      .form-group input:focus, .form-group select:focus {
        border: 2px solid var(--md-primary); padding: 13px 15px; background: var(--md-surface-container-high);
      }
      .form-group option { background: var(--md-surface); color: var(--text-main); }

      .btn-main {
        width: 100%; padding: 12px; background: var(--md-primary);
        color: var(--md-on-primary); border: none; border-radius: var(--radius-pill);
        font-weight: 600; cursor: pointer; font-family: inherit; font-size: 15px;
        transition: 0.2s; box-shadow: var(--shadow-1);
        display: flex; justify-content: center; align-items: center; gap: 8px;
      }
      .btn-main:active { transform: scale(0.98); }
      .btn-main:disabled { opacity: 0.7; cursor: not-allowed; }

      /* --- অ্যাপ কন্টেন্ট --- */
      #app-content {
        display: none; padding-bottom: 90px; height: 100dvh;
        overflow-y: auto; scroll-behavior: smooth;
      }

      header {
        background: var(--md-surface); padding: 12px 20px;
        position: sticky; top: 0; z-index: 100; color: var(--text-main);
        display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.08); transition: background-color 0.3s;
      }

      main { padding: 16px; max-width: 600px; margin: 0 auto; }

      .view-section {
        display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .view-section.active { display: block; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card {
        background: var(--md-surface); border-radius: var(--radius);
        padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-1);
      }

      /* --- মিল নির্বাচন --- */
      .meal-btn-selector {
        width: 100%; padding: 16px; background: var(--md-secondary-container);
        color: var(--md-on-secondary-container); border: none; border-radius: 16px;
        font-weight: 600; font-size: 16px; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
        font-family: inherit; margin-bottom: 16px; transition: 0.2s;
      }
      .meal-btn-selector:active { transform: scale(0.98); }

      .popup-list { display: flex; flex-direction: column; gap: 8px; padding: 15px; overflow-y: auto; max-height: 50vh; }
      .popup-item {
        padding: 16px 20px; text-align: left; background: var(--md-surface);
        border: 1px solid var(--md-outline-variant); border-radius: 12px;
        font-size: 16px; font-weight: 500; color: var(--md-on-surface);
        font-family: inherit; cursor: pointer; display: flex;
        justify-content: space-between; align-items: center; transition: 0.2s;
      }
      .popup-item .material-symbols-outlined { display: none; color: var(--md-primary); font-size: 24px; }
      .popup-item.selected {
        background: var(--md-primary-container); border-color: var(--md-primary-container);
        color: var(--md-on-primary-container);
      }
      .popup-item.selected .material-symbols-outlined { display: inline-block; }

      /* --- মেসেঞ্জার সেকশন --- */
      #messenger {
        height: calc(100dvh - 177px - env(safe-area-inset-bottom));
        position: relative; flex-direction: column; overflow: hidden; display: none;
      }
      #messenger.active { display: flex; }

      .chat-container {
        display: flex; flex-direction: column; gap: 17px; padding: 10px 0 85px 0;
        height: 100%; overflow-y: auto; scroll-behavior: smooth;
      }

      .message-group { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
      .message-group.sent { align-self: flex-end; flex-direction: row-reverse; }

      .msg-avatar {
        width: 32px; height: 32px; border-radius: 50%; background: var(--md-surface-variant);
        flex-shrink: 0; margin-bottom: 20px; object-fit: cover;
      }
      .msg-content-wrapper { display: flex; flex-direction: column; gap: 4px; }
      .message-group.sent .msg-content-wrapper { align-items: flex-end; }
      .sender-name { font-size: 11px; font-weight: 600; color: var(--text-muted); margin: 0 4px; }

      .bubble {
        padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4;
        position: relative; max-width: 85%; word-break: break-word;
      }
      .received .bubble {
        background: var(--md-surface-variant); color: var(--md-on-surface-variant); border-bottom-left-radius: 4px;
      }
      .sent .bubble {
        background: var(--md-primary-container); color: var(--md-on-primary-container); border-bottom-right-radius: 4px;
      }
      .msg-time { font-size: 10px; opacity: 0.8; margin-top: 2px; color: var(--text-muted); }

      .chat-input-area {
        position: absolute; bottom: 0; left: 0; right: 0; background: var(--md-surface);
        padding: 12px 16px; display: flex; align-items: center; justify-content: center;
        z-index: 10; border-top: 1px solid var(--md-outline-variant);
      }
      .chat-input-wrapper {
        width: 100%; display: flex; gap: 10px; background: var(--md-surface-container-high);
        padding: 6px 6px 6px 16px; border-radius: 30px; box-shadow: var(--shadow-1); align-items: center;
      }
      .chat-input-area input {
        flex: 1; padding: 10px 0; border: none; background: transparent;
        outline: none; color: var(--md-on-surface); font-family: inherit; font-size: 15px;
      }
      .send-btn {
        width: 40px; height: 40px; border-radius: 50%; background: var(--md-primary);
        color: var(--md-on-primary); border: none; display: flex; align-items: center;
        justify-content: center; cursor: pointer; transition: 0.2s;
      }
      .send-btn:active { transform: scale(0.9); }

      /* Notification */
      .notif-item {
        padding: 16px; border-radius: var(--radius); background: var(--md-surface);
        margin-bottom: 12px; display: flex; gap: 16px; position: relative;
        box-shadow: var(--shadow-1); border: 1px solid transparent; transition: 0.3s;
      }
      .notif-item.unread { border-color: var(--md-outline-variant); }
      .notif-item.read { opacity: 0.6; box-shadow: none; border-color: var(--md-surface-variant); background: var(--md-surface-container); }
      .notif-icon {
        width: 48px; height: 48px; border-radius: 50%; display: flex;
        align-items: center; justify-content: center; flex-shrink: 0;
      }
      .unread .notif-icon { background: var(--md-tertiary-container); color: var(--md-on-tertiary-container); }
      .read .notif-icon { background: var(--md-surface-variant); color: var(--md-on-surface-variant); }

      .mark-read-btn {
        margin-top: 12px; padding: 8px 16px; font-size: 13px;
        color: var(--md-on-secondary-container); background: var(--md-secondary-container);
        border: none; border-radius: var(--radius-pill); font-weight: 600; cursor: pointer;
        font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
      }

      /* Bottom Navigation (Material 3 style) */
      .bottom-nav {
        position: fixed; bottom: 0; left: 0; right: 0; background: var(--md-surface-container);
        height: 80px; display: grid; grid-template-columns: repeat(5, 1fr);
        align-items: center; z-index: 200; padding-bottom: env(safe-area-inset-bottom);
        box-shadow: 0px -1px 3px rgba(0,0,0,0.05);
      }
      .nav-item {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 4px; background: none; border: none; color: var(--md-on-surface-variant);
        font-family: inherit; font-weight: 500; font-size: 12px; cursor: pointer; height: 100%;
        transition: 0.3s ease; position: relative;
      }
      .nav-icon-wrap {
        width: 32px; height: 32px; border-radius: 16px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex; align-items: center; justify-content: center; position: relative;
      }
      .nav-item.active { color: var(--md-on-surface); font-weight: 600; }
      .nav-item.active .nav-icon-wrap {
        width: 64px; background: var(--md-secondary-container); color: var(--md-on-secondary-container);
      }
      .nav-badge {
        position: absolute; top: 0px; right: -4px; background: var(--md-error);
        color: var(--md-on-error); font-size: 10px; font-weight: 600; padding: 0 4px;
        border-radius: 8px; min-width: 16px; text-align: center; box-shadow: 0 0 0 2px var(--md-surface-container);
      }

      /* Modal */
      .modal {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px);
        display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
      }
      .modal-content {
        background: var(--md-surface-container-high); border-radius: 28px; width: 100%;
        max-width: 360px; overflow: hidden; box-shadow: var(--shadow-3);
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes slideUp {
        from { transform: translateY(40px) scale(0.95); opacity: 0; }
        to { transform: translateY(0) scale(1); opacity: 1; }
      }

      /* Material 3 Snackbar/Toast */
      .toast-box {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: var(--md-inverse-surface); color: var(--md-inverse-on-surface);
        padding: 14px 24px; border-radius: 8px; font-size: 14px;
        transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000;
        font-weight: 500; box-shadow: var(--shadow-2); opacity: 0; pointer-events: none;
        display: flex; align-items: center; gap: 8px; min-width: 250px; justify-content: center;
      }
      .toast-box.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }

      /* Theme Toggle Button */
      #theme-toggle {
        background: transparent; border: none; color: var(--md-on-surface-variant);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 50%; transition: background-color 0.2s;
      }
      #theme-toggle:hover { background-color: var(--md-surface-variant); }
      
      .toggle-icon-wrap {
          display: flex; transition: transform 0.3s ease;
      }
      #theme-toggle:active .toggle-icon-wrap { transform: rotate(45deg); }
    </style>
  </head>
  <body>
    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-logo"><span class="material-symbols-outlined">
          crisis_alert
        </span></div>
        <h2 style="margin-bottom: 24px; color: var(--text-main); font-weight: 600">
          আবিদ সিকিউরিটি পোর্টাল
        </h2>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuth('login')">পুরোনো Account</button>
          <button class="auth-tab" onclick="switchAuth('signup')">নতুন Account</button>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label>নাম</label>
            <select id="loginName" required>
              <option value="">নাম লোড হচ্ছে...</option>
            </select>
          </div>
          <div class="form-group">
            <label>ই-মেল</label>
            <input type="email" id="loginEmail" placeholder="আপনার ই-মেল দিন" required />
          </div>
          <button type="submit" class="btn-main" id="loginBtn">লগইন করুন</button>
        </form>

        <form id="signupForm" style="display: none">
          <div class="form-group">
            <label>নাম নির্বাচন করুন</label>
            <select id="signupName" required>
              <option value="">নাম লোড হচ্ছে...</option>
            </select>
          </div>
          <div class="form-group">
            <label>ই-মেল দিন</label>
            <input type="email" id="signupEmail" placeholder="একটি নতুন ই-মেল দিন" required />
          </div>
          <button type="submit" class="btn-main" id="signupBtn">অ্যাকাউন্ট তৈরি করুন</button>
        </form>
      </div>
    </div>

    <div id="app-content">
      <header>
        <h3 id="view-title" style="font-size: 20px; font-weight: 600">হোম</h3>
        <div style="display: flex; gap: 10px; align-items: center">
          <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode">
            <div class="toggle-icon-wrap">
                <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            </div>
          </button>
          <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--md-surface-variant); overflow: hidden; cursor: pointer; border: 1px solid var(--md-outline-variant);">
            <img id="headerAvatar" src="" style="width: 100%; height: 100%; object-fit: cover" />
          </div>
        </div>
      </header>

      <main>
        <section id="home" class="view-section active">
          <div class="card">
            <h4 style="margin-bottom: 16px; color: var(--text-main); font-weight: 600;">আপনার মিল নির্বাচন করুন</h4>
            <button id="mealSelectBtn" class="meal-btn-selector" onclick="openMealPopup()">
              <span id="mealBtnText">মিল নির্বাচন করুন</span>
              <span class="material-symbols-outlined" id="mealBtnIcon">arrow_drop_down_circle</span>
            </button>

            <div id="meal-submission-result" style="padding: 14px; border-radius: 12px; background: var(--md-primary-container); color: var(--md-on-primary-container); font-weight: 600; text-align: center; display: none; margin-bottom: 16px;"></div>

            <div style="margin-top: 10px">
              <button onclick="toggleOthersMeal()" style="width: 100%; padding: 16px; background: var(--md-surface-container); color: var(--md-on-surface); border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span class="material-symbols-outlined" style="color: var(--md-primary);">visibility</span>
                  <span>আজকের মিল এন্ট্রি দেখুন</span>
                </div>

      async function fetchMealLockTimes() {
        try {
          const response = await apiFetch(CSV_URL_1);

                mealOptionsHtml += `

            });
            if (mealOptionsHtml !== "") popupList.innerHTML = mealOptionsHtml;
          }

          const validRows = csvSheetData1.data.filter((row) => row.Name);
          MEAL_LOCK_END_HOUR = Number(validRows.map((row) => row.MealOnHour)[0]);
          MEAL_LOCK_END_MIN = Number(validRows.map((row) => row.MealOnMunite)[0]);
          MEAL_LOCK_START_HOUR = Number(validRows.map((row) => row.MealOffHour)[0]);
          MEAL_LOCK_START_MIN = Number(validRows.map((row) => row.MealOffMunite)[0]);
          applyMealLockState();
        } catch (error) {
          MEAL_LOCK_START_HOUR = 22; MEAL_LOCK_START_MIN = 30; MEAL_LOCK_END_HOUR = 5; MEAL_LOCK_END_MIN = 40;
          applyMealLockState();

      function generateFingerprint() {
        const d = [navigator.userAgent, navigator.language, window.screen.colorDepth, window.screen.width + "x" + window.screen.height, new Date().getTimezoneOffset(), navigator.hardwareConcurrency, navigator.deviceMemory, navigator.platform].join("||");
        const hash = (str, seed = 0) => {
          let h1 = 0xdeadbeef ^ seed, h2 = 0x41c6ce57 ^ seed;
          for (let i = 0; i < str.length; i++) {
            let ch = str.charCodeAt(i);
            h1 = Math.imul(h1 ^ ch, 2654435761); h2 = Math.imul(h2 ^ ch, 1597334677);
          }
          h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507); h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
          h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507); h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
          return ((h2 >>> 0).toString(16).padStart(8, "0") + (h1 >>> 0).toString(16).padStart(8, "0")).toUpperCase();
        };
        return "FP_" + hash(d);
      }

      function previewProfilePic(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement("canvas");
            const MAX_WIDTH = 400, MAX_HEIGHT = 400;
            let width = img.width, height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext("2d"); ctx.drawImage(img, 0, 0, width, height);
            tempBase64Pic = canvas.toDataURL("image/jpeg", 0.6);
            document.getElementById("profileAvatar").src = tempBase64Pic;
            document.getElementById("saveProfilePicBtn").style.display = "inline-flex";
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      async function uploadProfilePic() {
        if (!tempBase64Pic) return;
        const btn = document.getElementById("saveProfilePicBtn");
        btn.innerHTML = '<span class="spinner"></span> আপলোড হচ্ছে...';
        btn.disabled = true;

        const len = tempBase64Pic.length; const partSize = Math.ceil(len / 3);
        const part1 = tempBase64Pic.substring(0, partSize), part2 = tempBase64Pic.substring(partSize, partSize * 2), part3 = tempBase64Pic.substring(partSize * 2);
        const action = localStorage.getItem("userProfilePic") ? "updateprofilepic" : "setprofilepic";

        try {
          const response = await apiFetch(`${SCRIPT_URL_LOGIN}?action=${action}`, {
            method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ name: localStorage.getItem("userName"), fingerprint: localStorage.getItem("userFingerPrint"), part1, part2, part3 }),
          });
          if (response.ok || response.type === "opaque") {
            localStorage.setItem("userProfilePic", tempBase64Pic);
            document.getElementById("headerAvatar").src = tempBase64Pic;
            btn.style.display = "none"; showToast("প্রোফাইল ছবি সফলভাবে আপডেট হয়েছে!");

        finally { btn.innerHTML = 'ছবি সেভ করুন'; btn.disabled = false; }
      }

        const box = document.getElementById("chatBox");

          const response = await apiFetch(`${SCRIPT_URL_MSG}?action=getMessages`);
          const messagesData = await response.json();
          
          // মেসেজ কাউন্ট এবং নোটিফিকেশন ব্যাজ লজিক
          const lastMsgCount = parseInt(localStorage.getItem("abid_last_msg_count")) || 0;
          const currentCount = messagesData.length;
          const navMsgBadge = document.getElementById("nav-msg-badge");
          
          if (localStorage.getItem("currentNav") === "messenger") {
              // মেসেজ ট্যাবে থাকলে স্টোরেজ আপডেট করে ব্যাজ মুছে দিবে
              localStorage.setItem("abid_last_msg_count", currentCount);
              if (navMsgBadge) navMsgBadge.style.display = "none";
          } else {
              // মেসেজ ট্যাবের বাইরে থাকলে আনরিড মেসেজ চেক করবে
              const unreadCount = currentCount - lastMsgCount;
              if (unreadCount > 0 && navMsgBadge) {
                  navMsgBadge.innerText = unreadCount;
                  navMsgBadge.style.display = "block";
              }
          }
          
          // শুধুমাত্র মেসেজ ট্যাবে থাকলে রেন্ডার করবে
          if(localStorage.getItem("currentNav") === "messenger" || !box.innerHTML.includes('message-group')){
            renderMessages(messagesData);
          }

        } catch (error) {
          if(localStorage.getItem("currentNav") === "messenger") {
              box.innerHTML = '<div style="text-align:center; padding:20px; color:var(--danger);">মেসেজ লোড করতে ব্যর্থ হয়েছে।</div>';
          }
        }
      }

      function renderMessages(msgs) {
        const box = document.getElementById("chatBox");
        const currentUserFP = localStorage.getItem("userFingerPrint");
        
        if (!msgs || msgs.length === 0) {
          box.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">কোনো মেসেজ নেই। নতুন মেসেজ পাঠান!</div>';
          return;
        }
        
        box.innerHTML = msgs.map((m) => {
          const isSentByMe = m.userFingerPrint === currentUserFP;
          const msgType = isSentByMe ? "sent" : "received";
          const avatarSrc = isSentByMe && localStorage.getItem("userProfilePic") 
            ? localStorage.getItem("userProfilePic") 
            : `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(m.userName)}`;
          
          // অ্যাডমিন ল্যাবেলিং
          let senderDisplay = isSentByMe ? "আপনি" : m.userName;
          if (m.userName === "আবিদ") {
              senderDisplay = `অ্যাডমিনিস্ট্রেটর <span class="material-symbols-outlined" style="font-size: 13px; color: var(--md-primary); vertical-align: text-center;">shield_person</span> <span style="color: var(--md-primary); font-weight: 700;"> ${isSentByMe ? 'আপনি' : 'আবিদ'}</span>`;
          }

          return `<div class="message-group ${msgType}"><img src="${avatarSrc}" class="msg-avatar"><div class="msg-content-wrapper"><span class="sender-name">${senderDisplay}</span><div class="bubble">${m.message}</div><span class="msg-time">${m.dateTime}</span></div></div>`;
        }).join("");
        
        box.scrollTop = box.scrollHeight;
      }

      async function sendMsg() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;
        const sendBtn = document.getElementById("sendMsgBtn");
        
        const fp = localStorage.getItem("userFingerPrint") || "Unknown";
        const uName = localStorage.getItem("userName") || "Anonymous";
        const now = new Date();
        const dateTimeStr = now.toLocaleDateString("bn-BD") + " " + now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
        
        input.disabled = true;
        sendBtn.innerHTML = '<span class="spinner" style="border-color:var(--md-on-primary);"></span>';

        const box = document.getElementById("chatBox");
        const avatarSrc = localStorage.getItem("userProfilePic") || `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(uName)}`;
        
        // টেম্পরারি ডিসপ্লে 
        let senderDisplay = "আপনি (পাঠানো হচ্ছে...)";
        if (uName === "আবিদ") {
             senderDisplay = `<span class="material-symbols-outlined" style="font-size: 13px; color: var(--md-primary); vertical-align: text-bottom;">shield_person</span> <span style="color: var(--md-primary); font-weight: 700;">অ্যাডমিনিস্ট্রেটর · আপনি (পাঠানো হচ্ছে...)</span>`;
        }

        box.insertAdjacentHTML("beforeend", `<div class="message-group sent" id="temp-msg" style="opacity: 0.6;"><img src="${avatarSrc}" class="msg-avatar"><div class="msg-content-wrapper"><span class="sender-name">${senderDisplay}</span><div class="bubble">${text}</div><span class="msg-time">${dateTimeStr}</span></div></div>`);
        box.scrollTop = box.scrollHeight;

        try {
          const response = await apiFetch(`${SCRIPT_URL_MSG}?action=createMessage`, {
            method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ userFingerPrint: fp, userName: uName, message: text, dateTime: dateTimeStr }),
          });
          if (response.ok || response.type === "opaque") {
            input.value = "";
            const tempMsg = document.getElementById("temp-msg");
            if (tempMsg) tempMsg.remove(); // সাকসেস হলে fetchMessage নতুন করে রেন্ডার করবে 
            setTimeout(fetchMessages, 1000);
          } else throw new Error();
        } catch (error) {
          showToast("মেসেজ পাঠাতে সমস্যা হয়েছে।");
          const tempMsg = document.getElementById("temp-msg");
          if (tempMsg) tempMsg.remove();
        } finally {
          input.disabled = false;
          sendBtn.innerHTML = '<span class="material-symbols-outlined">send</span>';
          input.focus();
        }
      }

      function isMealLocked() {
        if (typeof MEAL_LOCK_START_HOUR === "undefined") return true;
        const now = new Date(); const currentMin = now.getHours() * 60 + now.getMinutes();
        const startMin = MEAL_LOCK_START_HOUR * 60 + MEAL_LOCK_START_MIN;
        const endMin = MEAL_LOCK_END_HOUR * 60 + MEAL_LOCK_END_MIN;
        return startMin > endMin ? currentMin >= startMin || currentMin < endMin : currentMin >= startMin && currentMin < endMin;
      }

      function applyMealLockState() {
        if (mealLockTimer) clearInterval(mealLockTimer);
        const mealBtn = document.getElementById("mealSelectBtn");
        const mealBtnText = document.getElementById("mealBtnText");
        const icon = document.getElementById("mealBtnIcon");
        const resultDiv = document.getElementById("meal-submission-result");

        if (typeof MEAL_LOCK_START_HOUR === "undefined") {
          mealBtn.disabled = true;
          mealBtn.style.background = "var(--md-surface-variant)"; mealBtn.style.color = "var(--md-on-surface-variant)";
          mealBtnText.innerHTML = `<span style="font-size: 15px; font-weight: 600; display:flex; align-items:center; gap:8px;"><span class="spinner primary"></span> চেক করা হচ্ছে...</span>`;
          icon.style.display = 'none'; resultDiv.style.display = "none"; return;
        }

        const saved = localStorage.getItem("abid_meal");
        let mealData = saved ? JSON.parse(saved) : null;
        let submittedOnce = false;
        if (mealData && mealData.timestamp) {
          const submitTime = new Date(mealData.timestamp);
          const lastUnlock = new Date(); lastUnlock.setHours(MEAL_LOCK_END_HOUR, MEAL_LOCK_END_MIN, 0, 0);
          if (new Date().getTime() < lastUnlock.getTime()) lastUnlock.setDate(lastUnlock.getDate() - 1);
          submittedOnce = submitTime.getTime() >= lastUnlock.getTime();
        }

        const naturallyLocked = isMealLocked();
        if (naturallyLocked || submittedOnce) {
          mealBtn.disabled = true; icon.style.display = 'inline-block';
          mealBtn.style.background = "var(--md-surface-variant)"; mealBtn.style.color = "var(--md-on-surface-variant)";
          icon.innerText = "lock";
          let targetTime = new Date(); let timeLabel, mainText;
          if (naturallyLocked) {
            mainText = "মিল নির্বাচনের সময় শেষ হয়েছে!";
            targetTime.setHours(MEAL_LOCK_END_HOUR, MEAL_LOCK_END_MIN, 0, 0);
            if (new Date() >= targetTime) targetTime.setDate(targetTime.getDate() + 1);
            timeLabel = "চালু হবে ঃ";
          } else {
            mainText = "মিল নির্বাচন সম্পন্ন (সাময়িক ভাবে বন্ধ)";
            targetTime.setHours(MEAL_LOCK_START_HOUR, MEAL_LOCK_START_MIN, 0, 0);
            if (new Date() >= targetTime) targetTime.setDate(targetTime.getDate() + 1);
            timeLabel = "বন্ধ হবে ঃ";
          }

          const updateTimer = () => {
            const diff = targetTime - new Date();
            if (diff <= 0) { clearInterval(mealLockTimer); applyMealLockState(); } 
            else {
              const h = Math.floor(diff / (1000 * 60 * 60)), m = Math.floor((diff / (1000 * 60)) % 60), s = Math.floor((diff / 1000) % 60);
              const timerSpan = document.getElementById("meal-countdown-timer");
              if (timerSpan) timerSpan.innerText = `${timeLabel} ${h.toString().padStart(2, "0")} ঘন্টা ${m.toString().padStart(2, "0")} মিনিট ${s.toString().padStart(2, "0")} সেকেন্ড পরে`;
            }
          };
          mealBtnText.innerHTML = `<div style="display: flex; flex-direction: column; align-items: flex-start; text-align: left;"><span style="font-size: 15px; font-weight: 600;">${mainText}</span><span id="meal-countdown-timer" style="font-size: 13px; font-weight: 600; color: var(--md-error); margin-top: 4px;"></span></div>`;
          updateTimer(); mealLockTimer = setInterval(updateTimer, 1000);

          if (mealData) {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `কালকের মিল &nbsp;<span class="material-symbols-outlined" style="font-size:18px; margin-right:5px; vertical-align:middle;">check_circle</span><b>${mealData.txt}</b>`;
          } else resultDiv.style.display = "none";
        } else {
          mealBtn.disabled = false; icon.style.display = 'inline-block';
          mealBtn.style.background = "var(--md-secondary-container)"; mealBtn.style.color = "var(--md-on-secondary-container)";
          icon.innerText = "arrow_drop_down_circle";
          mealBtnText.innerHTML = mealData ? `<b>${mealData.txt}</b> নির্বাচন করা হয়েছিল` : "মিল নির্বাচন করুন";
          if (mealData) {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<span class="material-symbols-outlined" style="font-size:18px; margin-right:5px; vertical-align:middle;">check_circle</span> নির্বাচিত ছিল: <b>${mealData.txt}</b>`;
          } else resultDiv.style.display = "none";
        }
      }

        if (typeof MEAL_LOCK_START_HOUR === "undefined") { showToast("ডেটা লোড হচ্ছে, অপেক্ষা করুন..."); return; }
        if (isMealLocked()) { showToast("মিল নির্বাচনের সময় শেষ হয়েছে!"); return; }
        document.getElementById("mealSelectionModal").style.display = "flex";
        const saved = localStorage.getItem("abid_meal"); tempSelectedMeal = saved ? JSON.parse(saved) : null;
        document.querySelectorAll(".popup-item").forEach((el) => {
          if (tempSelectedMeal && el.getAttribute("data-val") === tempSelectedMeal.val) el.classList.add("selected");
          else el.classList.remove("selected");
        });

      function closeMealPopup() { document.getElementById("mealSelectionModal").style.display = "none"; }

        document.querySelectorAll(".popup-item").forEach((el) => el.classList.remove("selected"));

      async function confirmMealSelection() {
        if (!tempSelectedMeal) { showToast("একটি মিল নির্বাচন করুন"); return; }
        const submitBtn = document.getElementById("mealSubmitBtn");
        submitBtn.innerHTML = '<span class="spinner"></span> অপেক্ষা করুন...'; submitBtn.disabled = true;

        try {
          const response = await apiFetch(`${SCRIPT_URL_MEAL}?action=createMeal`, {
            method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ name: localStorage.getItem("userName"), mealValue: tempSelectedMeal.val, mealText: tempSelectedMeal.txt, date: new Date().toISOString(), fingerprint: localStorage.getItem("userFingerPrint") }),
          });
          if (response.ok || response.type === "opaque") {
            tempSelectedMeal.timestamp = new Date().getTime();
            localStorage.setItem("abid_meal", JSON.stringify(tempSelectedMeal));
            applyMealLockState(); closeMealPopup(); showToast("মিল আপডেট সম্পন্ন হয়েছে");
            
            // "আজকের মিল এন্ট্রি দেখুন" সেকশনটি অটোমেটিক্যালি ওপেন করা হচ্ছে
            const list = document.getElementById("others-meal-list");
            if (list.style.display === "none" || list.style.display === "") {
               toggleOthersMeal();
            } else {
               fetchOthersMeals();
            }

          } else throw new Error();
        } catch (error) { showToast("মিল সাবমিট করতে সমস্যা হয়েছে।"); } 
        finally { submitBtn.innerHTML = 'ম্যানেজারের কাছে জমাদিন'; submitBtn.disabled = false; }

      function toggleOthersMeal() {
        const list = document.getElementById("others-meal-list");
        const icon = document.getElementById("others-meal-icon");
        if (list.style.display === "none" || list.style.display === "") {
          list.style.display = "block"; icon.style.transform = "rotate(180deg)"; fetchOthersMeals();

      async function fetchOthersMeals() {
        const list = document.getElementById("others-meal-list");
        list.innerHTML = getSkeletonLines(3);
        try {
          const res = await apiFetch(`${SCRIPT_URL_MEAL}?action=getMeals`);
          const data = await res.json();
          const today = new Date(); let mealsData = Array.isArray(data) ? data : data.data || [];
          const todaysMeals = mealsData.filter((item) => {
            if (!item.date) return false;
            const d = new Date(item.date);
            if (isNaN(d.getTime())) return String(item.date).includes(today.toLocaleDateString());
            return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
          });
          if (todaysMeals.length === 0) {
            list.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--text-muted);">আজকের কোনো মিল এন্ট্রি পাওয়া যায়নি।</div>'; return;
          }
          list.innerHTML = '<ul style="list-style: none; padding: 0; margin: 0">' + todaysMeals.map((m) => `<li style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--md-outline-variant); margin-bottom: 12px;"><span style="font-weight: 500; font-size: 15px; color: var(--md-on-surface);">${m.name || m.Name || "অজানা"}</span><span style="background: var(--md-primary-container); color: var(--md-on-primary-container); padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;">${m.mealText || m.meal || ""}</span></li>`).join("") + "</ul>";
        } catch (error) { list.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--danger);">ডেটা লোড করতে ব্যর্থ হয়েছে।</div>'; }

      async function fetchAllDaysMeals() {
        const container = document.getElementById("all-days-meal-container");
        const btnIcon = document.getElementById("all-days-meal-icon");

        if (container.style.display === "block") {
          container.style.display = "none"; btnIcon.style.transform = "scale(1)"; return;
        }

        container.style.display = "block"; btnIcon.style.transform = "scale(1.2)";
        container.innerHTML = getSkeletonLines(4);

        try {
          const response = await apiFetch(CSV_URL_ALL_DAYS);
          const text = await response.text();
          const csvData = parseCSV(text);
          const userName = localStorage.getItem("userName");
          const userRow = csvData.data.find((r) => (r.Name && r.Name.trim() === userName) || (r["নাম"] && r["নাম"].trim() === userName));

          if (!userRow) { container.innerHTML = '<p style="text-align:center; color: var(--md-error); padding: 10px;">আপনার কোনো ডেটা পাওয়া যায়নি।</p>'; return; }

          let mealsHtml = '<ul style="list-style: none; padding: 0; margin: 0;">';
          let foundMeals = false;
          Object.keys(userRow).forEach((key) => {
            const day = parseInt(key);
            if (!isNaN(day) && day >= 1 && day <= 31) {
              const mealVal = userRow[key];
              if (mealVal && mealVal.trim() !== "") {
                foundMeals = true;
                mealsHtml += `<li style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--md-outline-variant);">
                                <span style="font-weight: 600; color: var(--md-on-surface); display:flex; align-items:center; gap:6px;"><span class="material-symbols-outlined" style="color:var(--md-outline); font-size:18px;">calendar_today</span> তারিখ: ${day}</span>
                                <span style="background: var(--md-tertiary-container); color: var(--md-on-tertiary-container); padding: 2px 12px; border-radius: 8px; font-size: 14px; font-weight: 600;">${mealVal}</span>
                            </li>`;
              }
            }
          });
          mealsHtml += "</ul>";
          container.innerHTML = foundMeals ? mealsHtml : '<p style="text-align:center; color: var(--text-muted); padding: 10px;">এই মাসে আপনার কোনো মিল এন্ট্রি নেই।</p>';
        } catch (e) { container.innerHTML = '<p style="text-align:center; color: var(--md-error); padding: 10px;">ডেটা লোড করতে ব্যর্থ।</p>'; }
      }

      function parseCSV(text) {
        const rows = text.trim().split("\n").map((row) => row.split(","));
        const headers = rows[0].map((h) => h.trim());
        const data = rows.slice(1).map((row) => {
          let obj = {};
          row.forEach((cell, i) => { obj[headers[i]] = cell ? cell.trim().replace(/^"|"$/g, "") : ""; });
          return obj;
        });
        return { headers, data };
      }

                    <table style="width: 100%; text-align: left; border-collapse: collapse; font-size: 14px;">
                        <thead style="background: var(--md-surface); border-bottom: 1px solid var(--md-outline-variant);">
                            <tr><th style="padding: 16px; font-weight: 600; color: var(--text-muted);">নাম</th><th style="padding: 16px; font-weight: 600; color: var(--text-muted); text-align: center;">মিল</th><th style="padding: 16px; font-weight: 600; color: var(--text-muted); text-align: center;">জমা [৳]</th><th style="padding: 16px; font-weight: 600; color: var(--text-muted); text-align: center;">খরচ</th></tr>
                        </thead>
                        <tbody>
                            ${reportData.map((row) => `
                                <tr style="border-bottom: 1px solid var(--md-outline-variant);">
                                    <td style="padding: 16px; font-weight: 500; color: var(--text-main); white-space: nowrap;">${row.Name}</td>
                                    <td style="padding: 16px; text-align: center;"><span style="background: var(--md-primary-container); color: var(--md-on-primary-container); padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 600;">${row["Total Meal"] || 0}</span></td>
                                    <td style="padding: 16px; text-align: center; color: var(--text-muted); font-weight: 500;">${row.GivenTk || 0}</td>
                                    <td style="padding: 16px; text-align: center;">${row.Eaten && row.Eaten !== "0" ? `<span style="color: var(--md-error); font-weight: 600;">${row.Eaten}</span>` : `<span style="color: var(--md-outline-variant);">-</span>`}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
      }

      async function fetchNotifications() {
        try {
          const url = new URL(SCRIPT_URL_NOTIF);
          url.searchParams.append("action", "getNotifications");
          const userName = localStorage.getItem("userName");
          if (userName) url.searchParams.append("user", userName);
          const response = await apiFetch(url.toString());
          const fetchedNotifs = await response.json();
          let localNotifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
          let readIds = localNotifs.filter((n) => n.read).map((n) => String(n.id));
          const mergedNotifs = fetchedNotifs.map((n) => ({ ...n, read: readIds.includes(String(n.id)) }));
          localStorage.setItem("abid_notifs", JSON.stringify(mergedNotifs));
          renderNotifications();
        } catch (error) { renderNotifications(); }
      }

      function renderNotifications() {
        const box = document.getElementById("notif-box");
        let notifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
        let unreadCount = notifs.filter((n) => !n.read).length;
        const navBadge = document.getElementById("nav-notif-badge");
        if (navBadge) { navBadge.innerText = unreadCount; navBadge.style.display = unreadCount > 0 ? "block" : "none"; }

        if (notifs.length === 0) {
          box.innerHTML = `<div style='text-align:center; padding:50px 20px; color:var(--md-outline);'><span class="material-symbols-outlined" style="font-size:48px; margin-bottom:16px; opacity:0.5;">notifications_off</span><p style='font-weight:500;'>কোন নতুন নোটিফিকেশন নেই</p></div>`;
          document.getElementById("notif-count").innerText = "০টি নোটিফিকেশন";
          return;
        }

        document.getElementById("notif-count").innerText = `${unreadCount}টি নতুন নোটিফিকেশন`;
        box.innerHTML = notifs.sort((a, b) => b.id - a.id).map((n) => `
            <div class="notif-item ${n.read ? "read" : "unread"}" id="${n.id}">
                <div class="notif-icon"><span class="material-symbols-outlined">${n.icon ? n.icon.replace('fa-','') : "notifications"}</span></div>
                <div style="flex: 1;"><p style="font-weight: 600; font-size: 16px; color: var(--text-main); margin-bottom: 4px;">${n.title}</p><p style="font-size: 14px; color: var(--text-muted); line-height: 1.4;">${n.desc}</p>${!n.read ? `<button onclick="markRead('${n.id}')" class="mark-read-btn"><span class="material-symbols-outlined" style="font-size:16px;">check</span> পঠিত হিসেবে চিহ্নিত করুন</button>` : ""}</div>
            </div>
        `).join("");
      }

      function markRead(id) {
        let notifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
        let index = notifs.findIndex((n) => String(n.id) === String(id));
        if (index !== -1) {
          notifs[index].read = true;
          localStorage.setItem("abid_notifs", JSON.stringify(notifs));
          renderNotifications(); showToast("পঠিত হিসেবে চিহ্নিত হয়েছে");
        }
      }
      function clearNotif() {
        let notifs = JSON.parse(localStorage.getItem("abid_notifs")) || [];
        notifs.forEach((n) => (n.read = true));
        localStorage.setItem("abid_notifs", JSON.stringify(notifs));
        renderNotifications(); showToast("সব নোটিফিকেশন পঠিত হিসেবে চিহ্নিত করা হয়েছে");
      }
      
      // M3 Style Toast
      function showToast(msg) {
        const existingToast = document.querySelector(".toast-box");
        if (existingToast) existingToast.remove();
        const t = document.createElement("div");
        t.className = "toast-box";
        t.innerHTML = `<span class="material-symbols-outlined" style="font-size:20px;">info</span> ${msg}`;
        document.body.appendChild(t);
        void t.offsetWidth; t.classList.add("show");
        setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 400); }, 3000);
      }
    </script>
  </body>
  </html>
